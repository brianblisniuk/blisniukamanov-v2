# Netlify — Pasaporte Negro

[build]
  publish = "."

# Clean URLs — visitors don't need to type .html
[[redirects]]
  from = "/viajes"
  to = "/journeys.html"
  status = 200

[[redirects]]
  from = "/contacto"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/gracias"
  to = "/gracias.html"
  status = 200

# Archive folder: no se sirve públicamente
[[redirects]]
  from = "/_archive-pre-simplificacion/*"
  to = "/404.html"
  status = 404

# 404 fallback
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Form notifications — by default Netlify sends every form submission
# to the email of the team owner. To add additional notification recipients,
# go to: Netlify dashboard → Forms → Settings & usage → Form notifications.
# All forms are auto-detected by Netlify because each <form> in HTML carries
# the `data-netlify="true"` attribute and a unique `name`.

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "interest-cohort=()"

# Long cache for fonts and images (immutable assets)
[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Short cache for HTML so updates appear quickly
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300"
